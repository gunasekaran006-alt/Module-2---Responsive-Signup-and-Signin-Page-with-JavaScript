<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="Description" content="SignIn Page">
    <title>Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body class="bg-light d-flex align-items-center min-vh-100">

    <main class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-sm p-4">
                    <div class="text-center mb-3">
                        <img src="images/logo.jpg" alt="Travel App Logo" width="100" class="rounded-circle shadow-sm">
                    </div>
                    <h2 class="text-center mb-4">Sign In</h2>

                    <div id="loginAlert" class="alert alert-danger d-none" role="alert">
                        Invalid email or password!
                    </div>

                    <form id="signinForm" novalidate>

                        <div class="mb-3">
                            <label for="loginEmail" class="form-label">Email address</label>
                            <input type="email" class="form-control" id="loginEmail" required>
                            <small class="text-danger d-none" id="loginEmailError">Enter a valid email.</small>
                        </div>

                        <div class="mb-4">
                            <label for="loginPassword" class="form-label">Password</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="loginPassword" required>
                                <button class="btn btn-outline-secondary toggle-password" type="button">Show</button>
                            </div>
                            <small class="text-danger d-none" id="loginPasswordError">Password is required.</small>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Sign In</button>
                    </form>
                    <div class="text-center mt-3">
                        <p>Don't have an account? <a href="SignUp.html">Sign Up here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/index.js"></script>
</body>

</html>
