<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="Description" content="SignUp Page">
    <title>Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body class="bg-light d-flex align-items-center min-vh-100">

    <main class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-sm p-4">
                    <div class="text-center mb-3">
                        <img src="images/logo.jpg" alt="Travel App Logo" width="100" class="rounded-circle shadow-sm">
                    </div>
                    <h2 class="text-center mb-4">Create an Account</h2>
                    <form id="signupForm" novalidate>

                        <div class="mb-3">
                            <label for="fullName" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="fullName" required>
                            <small class="text-danger d-none" id="nameError">Name is required.</small>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email address</label>
                            <input type="email" class="form-control" id="email" required>
                            <small class="text-danger d-none" id="emailError">Enter a valid email (e.g.,
                                example@mail.com).</small>
                        </div>

                        <div class="mb-3">
                            <label for="phone" class="form-label">Phone Number</label>
                            <input type="text" class="form-control" id="phone" required>
                            <small class="text-danger d-none" id="phoneError">Phone number must be exactly 10
                                digits.</small>
                        </div>

                        <div class="mb-3">
                            <label for="city" class="form-label">Location/City</label>
                            <input type="text" class="form-control" id="city" required>
                            <small class="text-danger d-none" id="cityError">City must contain only alphabets.</small>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="password" required>
                                <button class="btn btn-outline-secondary toggle-password" type="button">Show</button>
                            </div>
                            <small class="text-danger d-none" id="passwordError">Minimum 8 characters, at least one
                                letter and one number.</small>
                        </div>

                        <div class="mb-4">
                            <label for="confirmPassword" class="form-label">Confirm Password</label>
                            <input type="password" class="form-control" id="confirmPassword" required>
                            <small class="text-danger d-none" id="confirmError">Passwords do not match.</small>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Sign Up</button>
                    </form>
                    <div class="text-center mt-3">
                        <p>Already have an account? <a href="SignIn.html">Sign In here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/index.js"></script>
</body>

</html>
